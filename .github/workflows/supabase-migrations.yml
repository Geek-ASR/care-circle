# Applies supabase/migrations/*.sql to the LIVE production Supabase project.
#
# Requires three repo secrets (Settings -> Secrets and variables -> Actions):
#   - SUPABASE_ACCESS_TOKEN  (personal access token: Supabase account -> Access Tokens)
#   - SUPABASE_PROJECT_ID    (the project ref, e.g. "abcdefghijklmnop")
#   - SUPABASE_DB_PASSWORD   (the project's database password, set at project creation)
#
# CAUTION: this workflow runs `supabase db push` directly against production
# on every push to main that touches supabase/migrations/**. There is no
# staging environment in this project's free-tier setup, so a bad migration
# ships straight to prod. Treat changes under supabase/migrations/** with the
# same scrutiny as a prod deploy: review the SQL carefully in the PR before
# merging. It is recommended (not implemented here, since it's a repo
# Settings change rather than a workflow change) to add branch protection
# on main requiring a PR review for changes under supabase/migrations/**.

name: Supabase Migrations

on:
  push:
    branches: [main]
    paths:
      - supabase/migrations/**
  workflow_dispatch:

jobs:
  migrate:
    name: Apply migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push
